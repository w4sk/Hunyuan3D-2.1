<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hunyuan3D viewer</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.1.1/dist/model-viewer.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; background: #1e1e1e; color: #ddd; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { display: flex; flex-direction: column; }
    header { padding: 10px 16px; background: #2a2a2a; border-bottom: 1px solid #3a3a3a; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    header h1 { margin: 0; font-size: 14px; font-weight: 600; color: #aaa; }
    label { font-size: 13px; }
    select, input[type="text"] { background: #333; color: #ddd; border: 1px solid #555; border-radius: 4px; padding: 4px 8px; font-size: 13px; }
    input[type="text"] { width: 260px; }
    button { background: #4a4aa0; color: white; border: none; border-radius: 4px; padding: 4px 12px; font-size: 13px; cursor: pointer; }
    button:hover { background: #5a5ab0; }
    .hint { font-size: 12px; color: #888; }
    model-viewer { flex: 1; width: 100%; background-color: #1e1e1e; --poster-color: #1e1e1e; }
  </style>
</head>
<body>
  <header>
    <h1>Hunyuan3D viewer</h1>
    <label>Path:
      <input id="path" type="text" placeholder="/outputs/<run>/textured.glb"
             value="/outputs/maasai_01/textured.glb"
             onkeydown="if(event.key==='Enter') loadModel(this.value)">
    </label>
    <button onclick="loadModel(document.getElementById('path').value)">Load</button>
    <a href="/outputs/" target="_blank" style="color:#88aaff;font-size:13px;">Browse outputs/ ↗</a>
    <span class="hint">Click a run dir to find its .glb, then paste the path here.</span>
  </header>
  <model-viewer
    id="viewer"
    src="/outputs/maasai_01/textured.glb"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1.0"
    environment-image="neutral"
    style="--poster-color: transparent;">
  </model-viewer>
  <script>
    function loadModel(src) {
      document.getElementById('viewer').setAttribute('src', src);
      document.getElementById('path').value = src;
    }
  </script>
</body>
</html>
