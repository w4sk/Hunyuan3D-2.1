server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Browseable directory listing under /outputs/ so users can navigate
    # generated runs and copy the .glb path into the viewer.
    location /outputs/ {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }
}
